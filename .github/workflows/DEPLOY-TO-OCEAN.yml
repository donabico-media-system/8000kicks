name: DEPLOY-TO-OCEAN

on:
  push:
    branches: [ main ]

# Đảm bảo không bị xung đột nếu có nhiều lệnh push liên tiếp
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: CHECKOUT CODE
        uses: actions/checkout@v4

      - name: DEPLOY TO GITHUB PAGES
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          # Tự động thêm thông báo commit để dễ quản lý trong tab Actions
          commit_message: "DEPLOY-TO-OCEAN: AUTOMATED SYSTEM SYNC [V3000-Ω]"
