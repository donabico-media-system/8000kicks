name: ACTIVE-MODULES

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  activate-all-modules:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Active-Modules.py
        env:
          PYTHONUNBUFFERED: '1'
          # 🎯 ĐÂY LÀ TỌA ĐỘ TRUNG TÂM: CHỈ CẦN THAY ĐỔI Ở ĐÂY CHO CÁC KHO TƯƠNG LAI
          TARGET_AFFILIATE_URL: 'https://donabico-global-media.github.io/8000kicks'
        run: |
          echo "=== EATHESEN V3000-Ω ACTIVE-MODULES ==="
          echo "Triggered at: $(date -u)"
          echo "Targeting URL: $TARGET_AFFILIATE_URL"
          python Modules/Active-Modules.py

      - name: Upload logs (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: active-modules-log-${{ github.run_number }}
          path: |
            **/*.log
            **/*.json
          retention-days: 7
