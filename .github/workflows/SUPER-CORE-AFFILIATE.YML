name: SUPER-CORE-AFFILIATE

on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/10 * * * *" # CHẠY TỰ ĐỘNG ĐỆ QUY 10 PHÚT MỘT LẦN ĐỂ TỐI ƯU DATA

jobs:
  EXECUTE_AFFILIATE_LOGIC:
    runs-on: ubuntu-latest
    steps:
      - name: CHECKOUT CODEBASE
        uses: actions/checkout@v4

      - name: SETUP PYTHON ENVIRONMENT
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: RUN ADTECH DATA INFERENCE ENGINE
        run: |
          python -c "
          import json
          import os
          from datetime import datetime

          DATA_FILE = 'SYSTEM_BRIDGE.JSON'
          if os.path.exists(DATA_FILE):
              with open(DATA_FILE, 'r') as F:
                  try:
                      SYSTEM_DATA = json.load(F)
                  except:
                      SYSTEM_DATA = {}
          else:
              SYSTEM_DATA = {}

          SYSTEM_DATA['AFFILIATE_CORE'] = {
              'TARGET_BRAND': '8000KICKS',
              'CAMPAIGN_STATUS': 'RUNNING',
              'OPTIMIZATION_STRATEGY': 'PERFORMANCE_MAX_HYPER_DRIVE',
              'LAST_EVOLUTION_TIME': datetime.now().isoformat(),
              'SERVERLESS_TELEMETRY_STATUS': 'STANDALONE_LOCAL_STORAGE_ENABLED',
              'GOOGLE_ADS_PAYLOAD_STRUCTURE': {
                  'ASSET_GROUPS': 'SYNCHRONIZED',
                  'TARGET_ROAS_AIM': 'MAX_PROFIT',
                  'CONVERSION_TRACKING': 'GTAG_ACTIVE'
              }
          }

          with open(DATA_FILE, 'w') as F:
              json.dump(SYSTEM_DATA, F, indent=2)

          print('==== PYTHON ADTECH CONTEXT INFERENCE IN UPPERCASE COMPLETE ====')
          "

      - name: RE-VERIFY MOBILE RESPONSIVE FONT COMPLIANCE
        run: |
          if grep -q "font-family:.*Times New Roman" index.html; then
              echo "✅ FONT COMPLIANCE VERIFIED: TIMES NEW ROMAN IS ACTIVE"
          else
              echo "⚠️ WARNING: CHECK FONT FAMILY CONFIGURATION IN CSS"
          fi

      - name: COMMIT AND PUSH EVOLVED AFFILIATE DATA
        run: |
          git config --local user.email "admin@donabicomedia.net"
          git config --local user.name "donabico-admin"
          git add SYSTEM_BRIDGE.JSON
          git commit -m "🧠 [SUPER-CORE] RECURSIVE ADTECH DATA REFRESH COMPLETE" || echo "NO CHANGES TO COMMIT"
          git push
