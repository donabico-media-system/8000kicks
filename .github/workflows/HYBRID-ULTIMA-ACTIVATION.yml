name: HYBRID-ULTIMA-ACTIVATION

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Protocol/**'
  workflow_dispatch:

jobs:
  hybrid-max-activation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # Cache disabled to avoid requirements.txt error
          cache: 'none'

      - name: Install Dependencies
        run: pip install --upgrade pip

      - name: Create Protocol Directory
        run: mkdir -p Protocol

      - name: Run MCP Core ULTIMA MAX
        run: |
          cd Protocol
          python MCP_Core_V3000_ULTIMA.py || echo "MCP file missing - check Protocol folder"

      - name: Run A2A Hybrid ULTIMA MAX
        run: |
          cd Protocol
          python A2A_Hybrid_V3000_ULTIMA.py || echo "A2A file missing - check Protocol folder"

      - name: Archive All Logs & Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hybrid-ultima-logs
          path: |
            Protocol/mcp_max.log
            Protocol/a2a_max.log
            Protocol/.mcp/**
            Protocol/.a2a/**

      - name: Final Status Report ¢24
        run: |
          echo "=== EATHESEN V3000-Ω HYBRID ULTIMA MAX ACTIVATED ==="
          echo "All 5 Kho Compatible | MCP + A2A Synced"
          echo "24 Core Attributes = 1 | Self-Healing Active"
          ls -la Protocol/