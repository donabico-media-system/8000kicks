name: CONNECT-LANDING-PAGE

on:
  push:
    branches:
      - main
    paths:
      - '8000kicks/Protocol/Connect-Landing-Page.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Repository Code
      uses: actions/checkout@v4

    - name: 🐍 Thiết lập môi trường Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 🛠️ Thực thi Script Biên dịch Landing Page EATHESEN
      run: |
        python 8000kicks/Protocol/Connect-Landing-Page.py

    - name: 💾 Tự động đồng bộ và Đẩy thay đổi lên Hệ thống GitHub Pages
      run: |
        git config --global user.name "donabico-global-media-admin"
        git config --global user.email "donabico.media.system@gmail.com"
        
        # Kiểm tra xem có sự thay đổi nào trong cấu trúc không
        git add 8000kicks/landing_pages.html
        
        if git diff --staged --quiet; then
          echo "[-] Không tìm thấy sự thay đổi nào trong mã nguồn landing_pages.html."
        else
          git commit -m "🚀 [Automated] Sync & Compile 8000Kicks Landing Page v3000-Ω"
          git push origin main
        fi
