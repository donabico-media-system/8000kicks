name: CONNECT-LANDING-PAGE

on:
  push:
    branches:
      - main
    paths:
      - '**/Connect-Landing-Page.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Repository Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Lấy toàn bộ lịch sử để tránh lỗi rebase cạn trên Git

    - name: 🐍 Thiết lập môi trường Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 🛠️ Tự động dò tìm và Thực thi Script EATHESEN
      run: |
        SCRIPT_PATH=$(find . -name "Connect-Landing-Page.py" -print -quit)
        if [ -z "$SCRIPT_PATH" ]; then
          echo "❌ LỖI: Không tìm thấy file Connect-Landing-Page.py trong repository!"
          exit 1
        fi
        echo "[+] Đã tìm thấy script tại: $SCRIPT_PATH"
        python "$SCRIPT_PATH"

    - name: 💾 Tự động đồng bộ và Đẩy thay đổi lên GitHub
      run: |
        git config --global user.name "donabico-global-media-admin"
        git config --global user.email "donabico.media.system@gmail.com"
        
        OUTPUT_PATH=$(find . -name "index.html" -print -quit)
        if [ -z "$OUTPUT_PATH" ]; then
          git add "**/index.html" 2>/dev/null || git add .
        else
          echo "[+] Ghi nhận file đầu ra tại: $OUTPUT_PATH"
          git add "$OUTPUT_PATH"
        fi
        
        if git diff --staged --quiet; then
          echo "[-] Không có sự thay đổi nào trong mã nguồn index.html."
        else
          git commit -m "🚀 [Automated] Sync & Compile 8000Kicks Landing Page index.html v3000-Ω"
          
          echo "[+] Đang đồng bộ dữ liệu tránh xung đột (git pull --rebase)..."
          git pull origin main --rebase
          
          echo "[+] Tiến hành đẩy dữ liệu an toàn lên GitHub..."
          git push origin main
        fi
