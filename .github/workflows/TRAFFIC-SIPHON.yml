name: TRAFFIC-SIPHON
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Siphon
        run: python3 Modules/Traffic-Siphon.py
        
      - name: Inject Red Border CSS
        # Bước này tự động chèn viền đỏ vào index.html nếu chưa có
        run: |
          if ! grep -q "border: 02px solid red" index.html; then
            sed -i 's|<head>|<head><style>body { border: 10px solid red !important; box-sizing: border-box; }</style>|' index.html
          fi

      - name: Push Updates
        run: |
          git config user.name "Siphon Bot"
          git config user.email "bot@github.com"
          git add Modules/traffic_report.json index.html
          git commit -m "Auto-update: Log & Interface" || echo "No changes"
          git push
          
