name: "AUTO-CORE-AFFILIATE"
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  autonomous-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: |
          pip install langgraph jinja2
          # Chạy trực tiếp tệp Connect-Drone-Bridge để kích hoạt Core
          python3 Connect-Drone-Bridge.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update Landing Page locally"
          file_pattern: 'index.html'
