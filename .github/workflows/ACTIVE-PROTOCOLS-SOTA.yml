name: ACTIVE-PROTOCOLS-SOTA

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sota-orchestration:
    runs-on: ubuntu-latest
    steps:
      - name: CHECKOUT REPOSITORY
        uses: actions/checkout@v3

      - name: EXECUTE PROTOCOL SIPHON
        run: python Protocols/Active-Protocols.py

      - name: SYNC RECURSIVE STATE
        run: |
          git config --global user.name 'donabico-global-media'
          git config --global user.email 'donabico.media.system@gmail.com'
          git add Protocols-Bridge.json
          if ! git diff --cached --quiet; then
            git commit -m "[SYSTEM UPDATE] TỰ ĐỘNG CẬP NHẬT MA TRẬN PROTOCOLS - DONABICO GLOBAL MEDIA"
            git push origin main
          fi
