name: A2A-HYBRID-ULTIMA-ACTIVATION

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Protocol/**'
  workflow_dispatch:

jobs:
  a2a-max-activation:
    runs-on: ubuntu-latest
    needs: mcp-max-activation  # Chain after MCP
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install --upgrade pip

      - name: Run A2A Hybrid ULTIMA MAX
        run: cd Protocol && python A2A_Hybrid_V3000_ULTIMA.py

      - name: Archive A2A Logs & Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: a2a-max-logs
          path: |
            Protocol/a2a_max.log
            Protocol/.a2a/**

      - name: Hybrid Sync & Status Report
        run: |
          echo "A2A-HYBRID-ULTIMA MAX ACTIVATED - MCP SYNC OK - ¢24"
          ls -la Protocol/
          echo "Hybrid Protocol Ready for All 5 Kho"