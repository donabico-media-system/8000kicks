name: SUPER-CORE-AFFILIATE

on:
  schedule:
    - cron: '0 */6 * * *'   # Tự động mỗi 6 giờ
  workflow_dispatch:        # Trigger thủ công từ Chrome

jobs:
  generate-drone-landing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install langgraph jinja2

      - name: Generate index.html (Drone Landing Page)
        working-directory: ./Super Core Affiliate
        run: python Super-Core-Affiliate.py

      - name: Deploy to GitHub Pages (always live 24/7)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages