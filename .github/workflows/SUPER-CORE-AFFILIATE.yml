name: SUPER-CORE-AFFILIATE

on:
  schedule:
    # Chạy tự động chu kỳ đệ quy mỗi 5 phút liên tục 24/7
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sota-evolution:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Harmonic Calibration (Execute Core Script)
        run: python "Super Core Affiliate/Super-Core-Affiliate.py"

      - name: Synchronize Singularity (Commit and Push Gateway)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "EATHESEN-CORE-BOT"
          git config --global user.email "core@donabicomedia.net"
          
          # 1. SAO LƯU: Bốc file JSON từ thư mục con ra vùng nhớ tạm
          cp "Super Core Affiliate/system_bridge.json" /tmp/system_bridge.json
          
          # 2. ĐỒNG BỘ CỨNG: Ép máy ảo cập nhật trạng thái mới nhất từ GitHub
          git fetch origin main
          git reset --hard origin/main
          
          # 3. GHI ĐÈ: Đưa file JSON ra thẳng thư mục gốc để Landing Page càn quét dữ liệu
          cp /tmp/system_bridge.json system_bridge.json
          
          # 4. PUSH LÊN GITHUB
          git add system_bridge.json
          if ! git diff --cached --quiet; then
            git commit -m "¢24-Evolution: Sync Matrix $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git main
          else
            echo "[EATHESEN] Trạng thái dữ liệu không đổi, bỏ qua chu kỳ Commit này."
          fi
