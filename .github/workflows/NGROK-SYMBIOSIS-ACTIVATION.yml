name: NGROK-SYMBIOSIS-ACTIVATION

on:
  # Cho phép chủ động bấm nút kích hoạt chạy bằng tay từ tab Actions
  workflow_dispatch:
  
  # Tự động chạy định kỳ mỗi 30 phút để kiểm tra giữ luồng kết nối luôn thông suốt
  schedule:
    - cron: '*/30 * * * *'

jobs:
  activate-tunnel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Source Code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Core Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Execute Symbiosis Core Execution
        env:
          # Truyền biến môi trường an toàn từ Secrets đã thiết lập trong cài đặt Kho
          REST_API_NGROK: ${{ secrets.REST_API_NGROK }}
        run: |
          python "Protocol/Ngrok Symbiosis Core/Ngrok-Symbiosis-Core.py"
