name: AUTO INJECT SCRIPT

on: [push]

jobs:
  inject:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v3
      - name: INJECT SCRIPT
        run: |
          # Kiểm tra xem file index nào đang tồn tại
          ls -F
          # Tự động chọn file index (ưu tiên file nào tồn tại)
          FILE="index.html"
          if [ -f "index (1).html" ]; then FILE="index (1).html"; fi
          
          if ! grep -q "x.js" "$FILE"; then
            sed -i "s|</body>|<script src='x.js' defer></script></body>|" "$FILE"
            git config user.name "Automation Bot"
            git config user.email "bot@github.com"
            git add "$FILE"
            git commit -m "Auto-inject routing script into $FILE"
            git push
          else
            echo "Script already injected."
          fi
