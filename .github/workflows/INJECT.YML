name: AUTO INJECT SCRIPT

on: [push]

jobs:
  inject:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v3
      - name: INJECT SCRIPT
        run: |
          if ! grep -q "x.js" index.html; then
            sed -i 's|</body>|<script src="x.js" defer></script></body>|' index.html
            git config user.name "Automation Bot"
            git config user.email "bot@github.com"
            git add index.html
            git commit -m "Auto-inject routing script"
            git push
          fi
