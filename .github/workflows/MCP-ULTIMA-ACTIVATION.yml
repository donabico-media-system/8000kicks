name: MCP-ULTIMA-ACTIVATION
on:
  push:
    branches: [ main, master ]
    paths: ['Protocol/**']
  workflow_dispatch:
jobs:
  mcp-real-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install -r requirements.txt
      - run: python Protocol/MCP_Core_V3000_ULTIMA.py
      - run: python -c "
          from Protocol.MCP_Core_V3000_ULTIMA import MCPCoreUltima
          mcp = MCPCoreUltima()
          print(mcp.process_signal('workflow_test', {'source': 'github-actions'}))
        "