name: MCP-ULTIMA-ACTIVATION

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Protocol/**'
  workflow_dispatch:

jobs:
  mcp-activation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install --upgrade pip

      - name: Run MCP Core ULTIMA MAX
        run: |
          cd Protocol && python MCP_Core_V3000_ULTIMA.py || echo "MCP file missing - check Protocol/"

      - name: Archive Logs
        uses: actions/upload-artifact@v4
        with:
          name: mcp-logs
          path: Protocol/mcp_max.log

      - name: Status Report
        run: |
          echo "MCP-ULTIMA-ACTIVATION SUCCESS - ¢24"
          ls -la Protocol/