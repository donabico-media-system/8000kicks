name: "RECEIVE-DRONE-UPDATE"

on:
  repository_dispatch:
    types: [LAUNCH_DRONE_LANDING_PAGE_UPDATE]

permissions:
  contents: write

jobs:
  sync-and-rebuild:
    runs-on: ubuntu-latest
    concurrency:
      group: drone-mesh-8000kicks
      cancel-in-progress: true   # Cancel bản cũ, chỉ chạy bản mới nhất

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Write index.html from Drone Payload"
        env:
          RAW_HTML_CONTENT: ${{ github.event.client_payload.html_content }}
        run: |
          cat << 'EOF' > index.html
          ${{ github.event.client_payload.html_content }}
          EOF

      - name: "Run All Modules .py trong Modules/ (Tự động Toàn Bộ)"
        run: |
          echo "📡 Quét và kích hoạt toàn bộ Modules/*.py ..."
          for module in Modules/*.py; do
            if [ -f "$module" ]; then
              echo "🚀 Kích nổ Module: $module"
              python3 "$module" || echo "⚠️ $module lỗi → tiếp tục các module khác"
            fi
          done

      - name: "Lock and Push Update State (ULTRA ROBUST 24/7)"
        run: |
          git config --global user.name "AETH-V5000-MASTER-CORE"
          git config --global user.email "sre-admin@donabico.global"

          for i in {1..8}; do
            echo "=== Retry lần $i/8 ==="

            # Đồng bộ lại remote mới nhất
            git fetch origin main --prune
            git checkout -B main origin/main || git checkout -B main

            # Ghi đè index.html từ payload (luôn mới nhất)
            cat << 'EOF' > index.html
            ${{ github.event.client_payload.html_content }}
            EOF

            git add index.html

            if git diff --cached --quiet; then
              echo "✅ Không có thay đổi mới. Bỏ qua."
              exit 0
            fi

            git commit -m "sys(drone-mesh): central module synchronization [skip ci]" || true

            # Push với force an toàn
            if git push origin main --force-with-lease; then
              echo "✅ PUSH THÀNH CÔNG lần $i"
              exit 0
            elif git push origin main --force; then
              echo "✅ PUSH FORCE THÀNH CÔNG lần $i"
              exit 0
            else
              echo "⚠️ Thất bại lần $i → sleep 3s rồi retry"
              sleep 3
            fi
          done

          echo "❌ Đã thử 8 lần vẫn fail. Kết thúc."
          exit 1

      - name: "Signal Back to Control Center"
        if: success()
        env:
          TEMPORARY_TOKEN: ${{ github.event.client_payload.one_time_token }}
        run: |
          curl -X POST \
            -H "Authorization: bearer $TEMPORARY_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/donabico-global-media/KHO-4-DRONE-LANDING-PAGE-CONTROL-CENTER/dispatches \
            -d '{"event_type": "REPORT_8000KICKS_SYNC_SUCCESS", "client_payload": {"status": "full_mesh_deployed", "modules_run": "all_py_executed"}}'
