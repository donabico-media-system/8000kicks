name: "RECEIVE-DRONE-UPDATE"

on:
  repository_dispatch:
    types: [LAUNCH_DRONE_LANDING_PAGE_UPDATE]

permissions:
  contents: write

jobs:
  sync-and-rebuild:
    runs-on: ubuntu-latest
    concurrency:
      group: drone-mesh-8000kicks
      cancel-in-progress: true

    steps:
      - name: "Checkout Drone Substrate"
        uses: actions/checkout@v4 

      - name: "Catch Dynamic Payload & Write File"
        env:
          RAW_HTML_CONTENT: ${{ github.event.client_payload.html_content }}
        run: |
          cat << 'EOF' > index.html
          ${{ github.event.client_payload.html_content }}
          EOF

      - name: "Infinite Module Connection & Execution"
        run: |
          echo "📡 Đang quét các Module tại 8000kicks/Modules/..."
          for module in Modules/*.py; do
            if [ -f "$module" ]; then
              echo "🚀 Kích nổ Module: $module"
              python3 "$module" || echo "⚠️ Module $module gặp sự cố, hệ thống vẫn tiếp tục..."
            fi
          done

      - name: "Lock and Push Update State (Robust Auto Mode)"
        run: |
          git config --global user.name "AETH-V5000-MASTER-CORE"
          git config --global user.email "sre-admin@donabico.global"
          
          # Cấu hình remote (giữ nguyên style file bạn gửi)
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          # Retry mạnh để chống lỗi rejected
          for i in {1..8}; do
            echo "=== Lần thử push $i/8 ==="

            git fetch origin main
            git checkout -B main origin/main || git checkout -B main

            # Ghi đè index.html từ payload (giữ nguyên style file bạn gửi)
            cat << 'EOF' > index.html
            ${{ github.event.client_payload.html_content }}
            EOF

            git add index.html
            git commit -m "sys(drone-mesh): central module synchronization [skip ci]" || echo "Không có thay đổi để commit"

            if git push origin main --force-with-lease || git push origin main --force; then
              echo "✅ PUSH THÀNH CÔNG lần $i"
              exit 0
            else
              echo "⚠️ Thất bại lần $i → retry sau 3s"
              sleep 3
            fi
          done

          echo "❌ Đã thử 8 lần vẫn fail"
          exit 1

      - name: "Signal Back to Control Center"
        if: success()
        env:
          TEMPORARY_TOKEN: ${{ github.event.client_payload.one_time_token }}
        run: |
          curl -X POST \
            -H "Authorization: bearer $TEMPORARY_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/donabico-global-media/KHO-4-DRONE-LANDING-PAGE-CONTROL-CENTER/dispatches \
            -d '{"event_type": "REPORT_8000KICKS_SYNC_SUCCESS", "client_payload": {"status": "full_mesh_deployed"}}'
