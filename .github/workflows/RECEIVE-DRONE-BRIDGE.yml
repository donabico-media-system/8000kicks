- name: "RECEIVE-DRONE-BRIDGE"
        env:
          TEMP_TOKEN: ${{ github.event.client_payload.bridge_temporary_token }} # Khóa ký gửi từ Kho 4 truyền sang
        run: |
          if [ -f "Modules/Connect-Drone-Bridge.py" ]; then
            echo "📡 Kích hoạt cổng thông tuyến trực tiếp về Lõi Mesh..."
            export BRIDGE_TOKEN=$TEMP_TOKEN
            python3 Modules/Connect-Drone-Bridge.py
          else
            echo "⚠️ Không tìm thấy tệp Connect-Drone-Bridge.py tại thư mục Modules."
          fi
