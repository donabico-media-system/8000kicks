name: "RECEIVE-DRONE-BRIDGE"

on:
  schedule:
    - cron: '*/10 * * * *'   # Tự động chạy mỗi 10 phút (24/7)

  repository_dispatch:
    types: [LAUNCH_DRONE_BRIDGE]

permissions:
  contents: write

jobs:
  drone-bridge-sync:
    runs-on: ubuntu-latest
    concurrency:
      group: drone-bridge-8000kicks
      cancel-in-progress: true

    steps:
      - name: "Checkout Drone Substrate"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Infinite Module Connection & Execution"
        run: |
          echo "📡 Đang quét và kích hoạt toàn bộ Modules/*.py ..."
          for module in Modules/*.py; do
            if [ -f "$module" ]; then
              echo "🚀 Kích nổ Module: $module"
              python3 "$module" || echo "⚠️ Module $module gặp sự cố, hệ thống vẫn tiếp tục..."
            fi
          done

      - name: "Connect-Drone-Bridge — Heartbeat 24/7"
        run: |
          echo "🔗 Khởi động Connect-Drone-Bridge V3000-Ω-Bridge-001"
          python3 Modules/Connect-Drone-Bridge.py || echo "⚠️ Bridge gặp vấn đề, tiếp tục..."

      - name: "Write index.html (chỉ khi có payload từ dispatch)"
        if: github.event_name == 'repository_dispatch' && github.event.client_payload.html_content != ''
        env:
          RAW_HTML_CONTENT: ${{ github.event.client_payload.html_content }}
        run: |
          cat << 'EOF' > index.html
          ${{ github.event.client_payload.html_content }}
          EOF

      - name: "Lock and Push Update State (chỉ khi có thay đổi)"
        run: |
          git config --global user.name "AETH-V5000-MASTER-CORE"
          git config --global user.email "sre-admin@donabico.global"

          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          # Chỉ push nếu có thay đổi (index.html hoặc module)
          git fetch origin main
          git checkout -B main origin/main || git checkout -B main

          git add index.html Modules/
          if git diff --cached --quiet; then
            echo "✅ Không có thay đổi mới. Bỏ qua push."
            exit 0
          fi

          git commit -m "sys(drone-bridge): auto heartbeat + module sync [skip ci]" || true

          for i in {1..5}; do
            if git push origin main --force-with-lease || git push origin main --force; then
              echo "✅ PUSH THÀNH CÔNG"
              exit 0
            else
              echo "⚠️ Retry push lần $i..."
              sleep 3
            fi
          done

          echo "❌ Push thất bại sau 5 lần"
          exit 1

      - name: "Signal Bridge Status"
        if: success()
        run: |
          echo "✅ Bridge workflow hoàn tất lúc $(date -u)"
