name: MCP-A2A-HYBRID
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sota-orchestration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Execute SOTA Agent Swarm
        env:
          CLOUDFLARE_AI_GATEWAY_URL: ${{ secrets.CLOUDFLARE_AI_GATEWAY_URL }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          pip install httpx
          python3 -c "
import asyncio
import importlib.util
import sys

# Load MCP
mcp_spec = importlib.util.spec_from_file_location('MCP', 'Protocol/MCP_Core_Init.py')
mcp = importlib.util.module_from_spec(mcp_spec)
mcp_spec.loader.exec_module(mcp)

# Load A2A (File có dấu gạch ngang)
a2a_spec = importlib.util.spec_from_file_location('A2A', 'Protocol/A2A-Google-Hybrid-Init.py')
a2a = importlib.util.module_from_spec(a2a_spec)
a2a_spec.loader.exec_module(a2a)

print(f'Status: {mcp.mcp_bridge.get_capabilities()}')
asyncio.run(a2a.a2a_agent.execute_swarm_decision('Sync State'))
"
