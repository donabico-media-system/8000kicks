name: "CONNECT-DRONE-BRIDGE"

on:
  repository_dispatch:
    types: [LAUNCH_DRONE_MESH_CONNECT, OCEAN_SIGNAL_INBOUND]
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  statuses: write

jobs:
  satellite-respond:
    runs-on: ubuntu-latest
    steps:
      - name: "🎛️ Hạ cánh Codebase Vệ tinh"
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      # =========================================================================
      # BƯỚC ĐỘT PHÁ: TỰ ĐỘNG KHỞI TẠO TOKEN ĐỘNG XUYÊN KHO TỪ GITHUB APP NỘI BỘ
      # =========================================================================
      - name: "🔑 Sinh mã xác thực tối cao xuyên hệ thống"
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          # Truy xuất trực tiếp thông tin định danh của App đang cấu hình an toàn
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: "donabico-global-media"

      - name: "🌀 Khởi tạo Môi trường Python thực địa"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📦 Cài đặt Phân phối Thư viện Mạng"
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: "📡 Thực thi Kết nối - Phản hồi trạng thái về Tổng trạm Kho 4"
        env:
          # Ép hệ thống dùng Token siêu cấp vừa sinh ra từ GitHub App để bẻ gãy lỗi 404
          BRIDGE_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          echo "[📡 CONNECTING] Đang giải mã Token định danh mạng lưới..."
          
          TARGET_FILE="Bridge/Connect-Drone-Bridge.py"
          
          if [ -f "$TARGET_FILE" ]; then
            echo "[✅ TRẠM PHÁT HIỆN] Tìm thấy tệp cầu nối tại tọa độ thực địa mới: $TARGET_FILE"
            echo "🚀 Kích hoạt tiến trình truyền tải ngược dòng..."
            python3 "$TARGET_FILE"
          else
            echo "[🚨 CRITICAL ERROR] Thống kê sai lệch! Không tìm thấy file tại vị trí mới: $TARGET_FILE"
            echo "📋 Sơ đồ cấu trúc cây thư mục hiện tại để đối chiếu nhanh:"
            find . -maxdepth 3 -not -path '*/.*'
            exit 1
          fi

      - name: "🔒 Khóa cổng nhận tín hiệu"
        if: always()
        run: |
          echo "✅ [SATELLITE LOG] Tiến trình phản hồi kết nối hoàn tất. Token động đã tự hủy."
