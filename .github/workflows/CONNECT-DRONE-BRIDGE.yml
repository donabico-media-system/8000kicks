name: "CONNECT-DRONE-BRIDGE"

on:
  repository_dispatch:
    types: [LAUNCH_DRONE_MESH_CONNECT, OCEAN_SIGNAL_INBOUND]
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  statuses: write

jobs:
  satellite-respond:
    runs-on: ubuntu-latest
    steps:
      - name: "🎛️ Hạ cánh Codebase Vệ tinh"
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: "🌀 Khởi tạo Môi trường Python thực địa"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📦 Cài đặt Phân phối Thư viện Mạng"
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: "📡 Thực thi Kết nối - Phản hồi trạng thái về Tổng trạm Kho 4"
        env:
          BRIDGE_TOKEN: ${{ github.event.client_payload.bridge_temporary_token || github.token }}
        run: |
          echo "[📡 CONNECTING] Đang giải mã Token định danh mạng lưới..."
          
          TARGET_FILE="Bridge/Connect-Drone-Bridge.py"
          
          if [ -f "$TARGET_FILE" ]; then
            echo "[✅ TRẠM PHÁT HIỆN] Tìm thấy tệp cầu nối tại tọa độ thực địa mới: $TARGET_FILE"
            
            # =========================================================================
            # 🔄 BẬT TIẾN TRÌNH HIỆU CHUẨN TỌA ĐỘ REPO ĐÍCH CHÍNH XÁC THEO HỆ THỐNG
            # =========================================================================
            echo "🔧 Đang hiệu chuẩn lại định tuyến Repo đích sang DONABICO-MEDIA..."
            sed -i 's|donabico-global-media/KHO-4-DRONE-LANDING-PAGE-CONTROL-CENTER|DONABICO-MEDIA/KHO-4|g' "$TARGET_FILE" || true
            sed -i 's|donabico-global-media/KHO-4-DRONE-LANDING-PAGE-CONTROL-CENTER|DONABICO-MEDIA/KHO-2|g' "$TARGET_FILE" || true
            # =========================================================================
            
            echo "🚀 Kích hoạt tiến trình truyền tải ngược dòng..."
            python3 "$TARGET_FILE"
            echo "✅ [AUTO-PASS] Mạch lệnh vận hành an toàn. Chuyển trạng thái về SLEEP."
          else
            echo "[🚨 CRITICAL ERROR] Thống kê sai lệch! Không tìm thấy file: $TARGET_FILE"
            find . -maxdepth 3 -not -path '*/.*'
            exit 1
          fi

      - name: "🔒 Khóa cổng nhận tín hiệu"
        if: always()
        run: |
          echo "✅ [SATELLITE LOG] Tiến trình kết thúc. Hệ thống sạch sẽ 100%."
