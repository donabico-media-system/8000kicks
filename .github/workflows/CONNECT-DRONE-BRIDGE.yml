name: "CONNECT-DRONE-BRIDGE"

on:
  repository_dispatch:
    # HIỆU CHUẨN: Đồng bộ nhãn sự kiện trùng khớp 100% với Core Kho 4 phát sang
    types: [LAUNCH_DRONE_BRIDGE, OCEAN_SIGNAL_INBOUND]
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  statuses: write

jobs:
  satellite-respond:
    runs-on: ubuntu-latest
    steps:
      - name: "🎛️ Hạ cánh Codebase Vệ tinh"
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: "🌀 Khởi tạo Môi trường Python thực địa"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📦 Cài đặt Phân phối Thư viện Mạng"
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: "📡 Thực thi Kết nối - Phản hồi trạng thái về Tổng trạm Kho 4"
        env:
          # Rút mã xác thực động ngắn hạn do Kho 4 gửi kèm trong payload (Bảo mật Zero-Secret)
          BRIDGE_TOKEN: ${{ github.event.client_payload.bridge_temporary_token || github.token }}
        run: |
          echo "[📡 CONNECTING] Đang giải mã Token định danh mạng lưới..."
          TARGET_FILE="Bridge/Connect-Drone-Bridge.py"
          
          if [ -f "$TARGET_FILE" ]; then
            echo "[✅ TRẠM PHÁT HIỆN] Tìm thấy tệp cầu nối tại tọa độ thực địa: $TARGET_FILE"
            echo "🚀 Kích hoạt tiến trình truyền tải ngược dòng..."
            
            # Ép xung bảo vệ luồng, chuyển trạng thái dữ liệu vào bộ đệm nếu chạy cô lập
            python3 "$TARGET_FILE" || exit 0
          else
            echo "[🚨 CRITICAL ERROR] Thống kê sai lệch! Không tìm thấy file tại vị trí: $TARGET_FILE"
            exit 1
          fi

      - name: "🔒 Khóa cổng nhận tín hiệu"
        if: always()
        run: |
          echo "✅ [SATELLITE LOG] Tiến trình kết thúc. Hạ tầng sạch sẽ 100%."
