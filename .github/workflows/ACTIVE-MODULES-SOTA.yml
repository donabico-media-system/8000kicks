# ╔════════════════════════════════════════════════════════════════════════════╗
# ║ ACTIVE-MODULES-SOTA.yml (V7 - UI ENHANCEMENT + GREEN BORDER CONTROL)       ║
# ╚════════════════════════════════════════════════════════════════════════════╝

name: "ACTIVE-MODULES-SOTA"

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      target_kho:
        description: 'Tên Kho Thương Hiệu'
        required: true
        default: '8000kicks'
      target_url:
        description: 'URL Landing Page'
        required: false
        default: 'https://donabico-global-media.github.io/8000kicks/'

concurrency:
  group: active-modules-${{ github.event.inputs.target_kho || github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  full-auto-24-7:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Reset to latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python & Node.js
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic pyngrok
          npm install dotenv google-ads-api || echo "Some Node modules skipped"

      - name: Auto Run ALL Scripts + UI Enhancement Mapping
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
          TARGET_KHO: ${{ github.event.inputs.target_kho }}
        run: |
          echo "=== EATHESEN V3000-Ω 24/7 MATRIX ==="

          mkdir -p Modules .github/scripts

          # Run all .js
          for script in .github/scripts/*.js; do
            if [ -f "$script" ]; then
              echo "→ Running $script..."
              node "$script" || echo "⚠️ Skipped $script"
            fi
          done

          # Run all .py
          for script in Modules/*.py .github/scripts/*.py; do
            if [ -f "$script" ]; then
              echo "→ Running $script..."
              python "$script" --url "$TARGET_URL" --kho "$TARGET_KHO" || echo "⚠️ Skipped $script"
            fi
          done

          # ÁNH XẠ UI ENHANCEMENT (Green Border + Pulse)
          echo "=== Mapping UI Effects to index.html ==="
          cat >> index.html << 'EOF'
<!-- UI ENHANCEMENT FROM ACTIVE-MODULES-SOTA.yml -->
<style>
body { 
    border: 4px solid #00ff66 !important; 
    box-sizing: border-box; 
    animation: pulseGreen 1.5s infinite alternate ease-in-out !important;
    box-shadow: inset 0 0 20px rgba(0, 255, 102, 0.4) !important;
}
@keyframes pulseGreen { 
    0% { border-color: #00cc55; box-shadow: inset 0 0 10px rgba(0, 255, 102, 0.3); } 
    100% { border-color: #00ff66; box-shadow: inset 0 0 30px rgba(0, 255, 102, 0.6); } 
}
</style>
EOF

      - name: Commit & Push All Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add Modules/ .github/scripts/ index.html || true
          
          if git diff --cached --quiet; then
            echo "[V3000-INFO] No changes."
          else
            git commit -m "feat(ui): V3000 24/7 Auto-run + Green Border Effect + Modules sync [skip ci]"
            git push origin main
            echo "[V3000-SUCCESS] Full 24/7 Sync + UI Enhancement Applied."
          fi
