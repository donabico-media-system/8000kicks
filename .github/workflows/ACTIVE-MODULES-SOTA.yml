name: ACTIVE-MODULES-SOTA

on:
  schedule:
    - cron: '*/5 * * * *'  # Chu kỳ chạy tự động đệ quy 5 phút/lần liên tục 24/7
  workflow_dispatch:

jobs:
  modules-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code Matrix
        uses: actions/checkout@v3
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Initialize Python Runtime
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Execute SOTA Core & Modules Calibration
        run: |
          python "Modules/Active-Modules.py"
          python "Super Core Affiliate/Super-Core-Affiliate.py"

      - name: Ghost Push Clean Signals
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "EATHESEN-CORE-BOT"
          git config --global user.email "core@donabicomedia.net"
          
          # Quản lý duy nhất file JSON ngoài gốc
          git add system_bridge.json
          
          if ! git diff --cached --quiet; then
            git commit -m "¢24-SOTA-Modules: Sync Matrix Verified $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
            
            # Gộp nhanh nhánh để tránh lỗi rejected
            git pull origin main --rebase
            
            # Đẩy mã nguồn an toàn lên GitHub
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git main
          else
            echo "[EATHESEN] Hệ thống cân bằng, không có thay đổi."
          fi
