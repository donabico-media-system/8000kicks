name: "ACTIVE-MODULES-SOTA"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  real-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Pull Latest Changes
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Pure Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic beautifulsoup4

      - name: Execute Autonomous Modules 24/7
        run: |
          echo "========================================================="
          echo "   🔰 KÍCH HOẠT HỆ THỐNG MÔ-ĐUN TỰ TRỊ TOÀN TRI V3000   "
          echo "========================================================="
          
          # LỆNH THANH LỌC TỐI CAO: Khử tận gốc thư mục rác node_modules trên máy chủ ảo
          if [ -d "node_modules" ]; then
            echo "🔥 [FOUND] Phát hiện thư mục rác node_modules. Tiến hành tiêu diệt..."
            rm -rf node_modules
            echo "✅ [PURGED] Đã xóa sổ node_modules khỏi cấu trúc vận hành."
          fi
          
          # Cấu hình URL thực địa mặc định cho các module Siphon cũ cần tham số
          DEFAULT_URL="https://donabico-global-media.github.io/8000kicks/"
          
          if [ -d "Modules" ]; then
            find Modules/ -type f -name "*.py" | sort | while read -r script; do
              echo "⏳ [PROCESSING] Đang khởi chạy: $script..."
              
              # Tự trị thông minh: Nếu phát hiện là file Siphon thì tự bù thêm tham số --url
              if [[ "$script" == *"Siphon"* ]]; then
                EXEC_CMD="python \"$script\" --url $DEFAULT_URL"
              else
                EXEC_CMD="python \"$script\""
              fi
              
              if eval $EXEC_CMD; then
                echo "✅ [SUCCESS] $script đã hoàn thành nhiệm vụ ổn định!"
              else
                echo "❌ [FAILED] $script gặp sự cố trong quá trình thực thi."
              fi
              echo "---------------------------------------------------------"
            done
          else
            echo "⚠️ [NOT FOUND] Không tìm thấy thư mục Modules/."
          fi

      - name: Standard Git Push & Sync Cleanup
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Thực hiện xóa vĩnh viễn node_modules trên cây thư mục GitHub (nếu có)
          if git status --porcelain | grep -q "node_modules"; then
            git rm -r --cached node_modules 2>/dev/null || true
          fi
          
          git add .
          if git diff --cached --quiet; then
            echo "========================================================="
            echo "✅ KHÔNG CÓ THAY ĐỔI - Hệ thống giữ nguyên trạng thái sạch."
            echo "========================================================="
          else
            git commit -m "V3000-Ω AUTONOMOUS SYSTEM STABILIZATION & PURGE [skip ci]"
            git push origin main
          fi
