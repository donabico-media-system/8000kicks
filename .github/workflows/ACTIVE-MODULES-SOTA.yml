# ╔════════════════════════════════════════════════════════════════════════════╗
# ║ ACTIVE-MODULES-SOTA.yml (V8 - SIMPLE & STABLE)                             ║
# ║ Chạy 24/7 - Tự động quét 2 thư mục - Ánh xạ vào index.html                 ║
# ╚════════════════════════════════════════════════════════════════════════════╝

name: "ACTIVE-MODULES-SOTA"

on:
  schedule:
    - cron: "*/20 * * * *"   # Chạy mỗi 20 phút
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-modules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python & Node.js
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic
          npm install dotenv || echo "dotenv skipped"

      - name: Auto Run ALL Scripts in 2 Folders
        run: |
          echo "=== EATHESEN V3000-Ω MATRIX START ==="

          mkdir -p Modules .github/scripts

          # Run all .js files
          echo "Running JavaScript modules..."
          for script in .github/scripts/*.js; do
            if [ -f "$script" ]; then
              echo "→ $script"
              node "$script" || echo "Skipped $script"
            fi
          done

          # Run all .py files
          echo "Running Python modules..."
          for script in Modules/*.py .github/scripts/*.py; do
            if [ -f "$script" ]; then
              echo "→ $script"
              python "$script" || echo "Skipped $script"
            fi
          done

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .github/scripts/ Modules/ index.html || true
          
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "V3000 24/7 Auto-run modules + UI sync [skip ci]"
            git push origin main
            echo "Push successful."
          fi
