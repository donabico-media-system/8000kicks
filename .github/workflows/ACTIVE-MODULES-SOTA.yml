name: "ACTIVE-MODULES-SOTA"

concurrency:
  group: "pages"
  cancel-in-progress: true

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  real-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Latest
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic beautifulsoup4
          npm install dotenv || echo "skipped"

      - name: Deep Scan and Execute Modules Only
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'https://donabico-global-media.github.io/8000kicks/' }}
        run: |
          echo "=== V3000 ABSOLUTE MODULES SCAN MODE ==="
          
          # Chỉ tập trung xử lý thư mục Modules
          mkdir -p Modules

          # Tạo script giám sát tối cao (Interceptor Shield)
          printf 'import os\nimport re\nfrom bs4 import BeautifulSoup\nfile_path = "index.html"\nif os.path.exists(file_path):\n    with open(file_path, "r", encoding="utf-8") as f: content = f.read()\n    if "name:" in content or "on:" in content: content = re.sub(r"^[\\s\\S]*?(?=(<!DOCTYPE html>|<html))", "", content)\n    soup = BeautifulSoup(content, "html.parser")\n    for a in soup.find_all("a"):\n        href = a.get("href", "")\n        if "8000kicks" in href or "sjv.io" in href:\n            a.string = "EXPLORE 8000KICKS WATERPROOF HEMP SHOES NOW"\n            a["style"] = "color: #00ff66; font-weight: bold; text-decoration: none; font-family: '\''Times New Roman'\'', Times, serif;"\n            a["data-dnbc-lock"] = "true"\n    content_str = str(soup)\n    content_str = content_str.replace("KHÁM PHÁ ECO - ADS AUTOMATIC + NODE.JS", "EXPLORE ECO")\n    content_str = content_str.replace("Giày Gai Dầu Bền Vững Carbon Negative", "Waterproof Hemp Shoes - Carbon Negative")\n    with open(file_path, "w", encoding="utf-8") as f: f.write(content_str)\n' > clean_jail.py

          # BẬT QUÉT VÔ HẠN (DEEP SCAN) TOÀN BỘ FILES .PY TRONG THƯ MỤC MODULES
          # Tìm kiếm tất cả các file .py kể cả trong thư mục con của Modules/
          find Modules/ -type f -name "*.py" | while read -r script; do
            if [[ "$script" == *"Performance-Max"* || "$script" == *"clean_jail"* ]]; then
              continue
            fi
            echo "Processing Target Script: $script"
            python "$script" --url "$TARGET_URL" || echo "Script $script failed or skipped"
            
            # Giam giữ cấu trúc, ép form chuẩn ngay sau khi file .py đó vừa chạm vào index.html
            python clean_jail.py
          done
          
          rm clean_jail.py

      - name: Inject Dynamic Frontend Lock & Strict Layout CSS
        run: |
          echo '' >> index.html
          echo '<script>
            function lockAndCleanAffiliateButtons() {
              const targetLinks = document.querySelectorAll("a");
              targetLinks.forEach(link => {
                const href = link.getAttribute("href") || "";
                if (href.includes("8000kicks") || href.includes("sjv.io")) {
                  link.setAttribute("data-dnbc-lock", "true");
                  if (!link.innerText.includes("EXPLORE 8000KICKS")) {
                    link.innerHTML = `<span class="base-text" style="font-family: '\''Times New Roman'\'', Times, serif !important;">EXPLORE 8000KICKS WATERPROOF HEMP SHOES NOW</span>`;
                  }
                }
              });
            }

            function ultraCleanVietnamese() {
              const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
              let node;
              while (node = walker.nextNode()) {
                if (node.parentElement) {
                  if (node.parentElement.closest("[data-dnbc-lock='\''true'\'']") || 
                      node.parentElement.tagName === "SCRIPT" || 
                      node.parentElement.tagName === "STYLE") {
                    continue;
                  }
                }
                if (/[àáạảãâầấậẩẫăằắặẳẵèéẹẻẽêềếệểễìíịỉĩòóọỏõôồốộổỗơờớợởỡùúụủũưừứựửữỳýỵỷỹđ]/i.test(node.nodeValue)) {
                  node.nodeValue = node.nodeValue
                    .replace(/KHÁM PHÁ ECO - ADS AUTOMATIC \+ NODE\.JS/gi, "EXPLORE ECO")
                    .replace(/Giày Gai Dầu Bền Vững Carbon Negative/gi, "Waterproof Hemp Shoes - Carbon Negative");
                }
              }
            }

            function runEcosystemCore() {
              lockAndCleanAffiliateButtons();
              ultraCleanVietnamese();
            }

            if (document.readyState === "loading") {
              document.addEventListener("DOMContentLoaded", runEcosystemCore);
            } else {
              runEcosystemCore();
            }
          </script>' >> index.html

          echo '<style>
            html, body { overflow-x: hidden !important; max-width: 100vw !important; font-family: "Times New Roman", Times, serif !important; }
            body { border: 4px solid #00ff66 !important; box-sizing: border-box; padding: 0 8px; }
            a[data-dnbc-lock="true"] {
              display: inline-block !important;
              color: #00ff66 !important; 
              font-weight: bold !important; 
              text-decoration: none !important; 
              font-family: "Times New Roman", Times, serif !important;
            }
            table, .comparison-table { width: 100% !important; max-width: 100% !important; overflow-x: auto; display: block; }
            img { max-width: 100% !important; height: auto !important; }
          </style>' >> index.html

      - name: Commit & Push Verified Clean Build
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "V3000 REAL + PURE MODULES SCAN [skip ci]"
            git push origin main
          fi
