name: ACTIVE-MODULES-SOTA

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:  # Nút kích hoạt thủ công trên giao diện GitHub Actions

permissions:
  contents: write

jobs:
  sota-orchestration:
    runs-on: ubuntu-latest
    
    steps:
      - name: CHECKOUT REPOSITORY
        uses: actions/checkout@v3

      - name: SET UP PYTHON ENVIRONMENT
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: EXECUTE NEURAL SIPHON PROTOCOL
        run: python Modules/Active-Modules.py

      - name: COMMIT AND SYNC RECURSIVE STATE
        run: |
          git config --global user.name 'donabico-global-media'
          git config --global user.email 'donabico.media.system@gmail.com'
          
          # 1. Cập nhật các thay đổi từ xa mà không merge
          git fetch origin main
          
          # 2. Reset local về trạng thái mới nhất của remote
          git reset --hard origin/main
          
          # 3. Chạy lại script để đảm bảo trạng thái sạch nhất (Đồng bộ Core và Modules)
          python Modules/Active-Modules.py
          
          # 4. Thêm các file đã cập nhật (system_bridge.json được Active-Modules tạo mới)
          git add system_bridge.json
          
          # 5. Commit và Push
          if git diff --cached --quiet; then
            echo "[-] KHÔNG CÓ THAY ĐỔI CẦN ĐỒNG BỘ."
          else
            git commit -m "[SYSTEM UPDATE] MA TRẬN ĐÃ TỰ ĐỘNG CẬP NHẬT - DONABICO GLOBAL MEDIA"
            git push origin main
            echo "[SUCCESS] ĐỒNG BỘ THÀNH CÔNG."
          fi
