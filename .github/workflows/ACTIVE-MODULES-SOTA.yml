name: "ACTIVE-MODULES-SOTA"

on:
  schedule:
    - cron: "0 */6 * * *" # Duy trì chu kỳ chạy tự động 6 tiếng một lần như file gốc của bạn
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL mục tiêu để quét dữ liệu'
        required: true
        default: 'https://donabico-global-media.github.io/8000kicks/'

# GIẢI PHÁP CỐT LÕI: Khóa luồng đồng bộ để chặn hoàn toàn lỗi tự hủy "Cancelled" của GitHub Pages
concurrency:
  group: github-pages-deploy-lock
  cancel-in-progress: false # Ép luồng triển khai xếp hàng tuần tự, không được hủy ngang job đang chạy

permissions:
  contents: write

jobs:
  execute-siphon-matrix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0 # Lấy toàn bộ lịch sử lịch trình commit phục vụ rebase an toàn

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Ecosystem Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic

      - name: Run EATHESEN Active Modules
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'https://donabico-global-media.github.io/8000kicks/' }}
        run: |
          echo "=== EATHESEN V3000-Ω ACTIVE-MODULES ==="
          cd Modules
          
          # Thực thi file điều phối lõi an toàn
          if [ -f "Active-Modules.py" ]; then
            python Active-Modules.py --url "$TARGET_URL" || echo "[WARNING] Ma trận chính có cảnh báo nhẹ."
          fi
          
          # Ép chạy trực tiếp các lõi siphoning nếu tệp tin tồn tại
          for script in Affiliate-Network-Siphon.py SEO-Shield-Siphon.py Social-Preview-Siphon.py Traffic-Siphon.py; do
            if [ -f "$script" ]; then
              echo "[FORCED ACTIVE] Khởi chạy: $script"
              python "$script" --url "$TARGET_URL" || echo "Module $script gặp gián đoạn nhỏ."
            fi
          done

      - name: Commit & Push Telemetry Reports
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Đảm bảo nhận diện đúng file log bất kể script Python chạy ở thư mục nào
          git add Modules/traffic_report.json || git add traffic_report.json || true
          
          if ! git diff-index --quiet HEAD --; then
            echo "[V3000-INFO] Phát hiện dữ liệu thay đổi. Tiến hành đồng bộ an toàn..."
            git commit -m "chore(telemetry): update active modules report [skip ci]"
            
            # CHIẾN LƯỢC AN TOÀN: Rebase đồng bộ trước khi đẩy để loại bỏ hoàn toàn lỗi xung đột Git
            git pull origin main --rebase
            git push origin main
          else
            echo "[V3000-INFO] Không phát hiện dữ liệu mới. Bỏ qua chu kỳ commit."
          fi
