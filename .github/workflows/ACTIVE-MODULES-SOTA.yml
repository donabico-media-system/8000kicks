name: ACTIVE-MODULES-SOTA

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *' # Chạy mỗi giờ để duy trì ma trận sống

permissions:
  contents: write # Quyền ghi để hệ thống tự tối ưu hóa Repository

jobs:
  sota-orchestration:
    runs-on: ubuntu-latest
    
    steps:
      - name: CHECKOUT REPOSITORY
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Đảm bảo lấy toàn bộ lịch sử để thực hiện rebase chính xác

      - name: SET UP PYTHON ENVIRONMENT
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: EXECUTE NEURAL SIPHON PROTOCOL
        run: python Modules/Active-Modules.py

      - name: COMMIT AND SYNC RECURSIVE STATE
        run: |
          # Cấu hình định danh chính thức của DONABICO GLOBAL MEDIA SYSTEM
          git config --global user.name 'donabico-global-media'
          git config --global user.email 'donabico.media.system@gmail.com'
          
          git add system_bridge.json
          
          # Kiểm tra thay đổi và tiến hành đồng bộ
          if git diff --quiet && git diff --staged --quiet; then
            echo "[-] HỆ THỐNG ĐÃ ĐỒNG BỘ - KHÔNG CÓ THAY ĐỔI MỚI."
          else
            git commit -m "[SYSTEM UPDATE] MA TRẬN ACTIVE-MODULES-SOTA CỦA DONABICO-GLOBAL-MEDIA ĐÃ TỰ ĐỘNG TỐI ƯU HÓA"
            
            # Giải quyết xung đột bằng cách rebase với remote trước khi push
            git pull --rebase origin main
            git push origin main
            
            echo "[SUCCESS] MA TRẬN ĐÃ ĐƯỢC ĐẨY LÊN HẠ TẦNG GITHUB CHÍNH THỨC."
          fi
