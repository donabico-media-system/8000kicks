name: "ACTIVE-MODULES-SOTA"

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  real-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Latest
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic
          npm install dotenv || echo "skipped"

      - name: Run Real Modules Only
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'https://donabico-global-media.github.io/8000kicks/' }}
        run: |
          echo "=== V3000 REAL PRODUCTION MODE ==="

          mkdir -p Modules .github/scripts

          # Run all real .js files
          for script in .github/scripts/*.js; do
            if [ -f "$script" ]; then
              echo "→ REAL JS: $script"
              node "$script" || echo "Skipped"
            fi
          done

          # Run real .py files (skip simulation)
          for script in Modules/*.py .github/scripts/*.py; do
            if [ -f "$script" ]; then
              if [[ "$script" == *"Performance-Max"* ]]; then
                echo "→ Skipped Simulation: $script"
                continue
              fi
              echo "→ REAL: $script"
              python "$script" --url "$TARGET_URL" || echo "Skipped"
            fi
          done

          # Real update to index.html
          echo '<!-- V3000 REAL UPDATE -->' >> index.html
          echo '<script>console.log("%c[V3000 REAL] All modules running live","color:#00ff66");</script>' >> index.html
          echo '<style>body{border:4px solid #00ff66!important;box-sizing:border-box;animation:pulseGreen 1.5s infinite alternate ease-in-out!important}@keyframes pulseGreen{0%{border-color:#00cc55}100%{border-color:#00ff66}}</style>' >> index.html

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .github/scripts/ Modules/ index.html || true
          
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "V3000 REAL PRODUCTION [skip ci]"
            git push origin main
            echo "Pushed successfully"
          fi