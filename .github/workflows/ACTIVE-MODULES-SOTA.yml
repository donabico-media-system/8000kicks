name: ACTIVE-MODULES-SOTA

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sota-orchestration:
    runs-on: ubuntu-latest
    
    steps:
      - name: CHECKOUT REPOSITORY
        uses: actions/checkout@v3

      - name: SET UP PYTHON ENVIRONMENT
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: START NGROK TUNNEL
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install ngrok
          
          # Cấu hình authtoken và chạy tunnel với xác thực trực tiếp biến môi trường
          ngrok config add-authtoken "${{ secrets.AUTHTOKEN_N }}"
          NGROK_AUTHTOKEN="${{ secrets.AUTHTOKEN_N }}" ngrok http 80 > /dev/null &
        env:
          NGROK_AUTHTOKEN: ${{ secrets.AUTHTOKEN_N }}

      - name: EXECUTE NEURAL SIPHON PROTOCOL
        run: python Modules/Active-Modules.py
        env:
          # Sử dụng tên secret khớp chính xác với Kho 4 (ảnh 1000008968.jpg)
          REST_API_NGROK: ${{ secrets.REST_API_NGROK }}

      - name: COMMIT AND SYNC RECURSIVE STATE
        run: |
          git config --global user.name 'donabico-global-media'
          git config --global user.email 'donabico.media.system@gmail.com'
          
          git fetch origin main
          git reset --hard origin/main
          
          python Modules/Active-Modules.py
          
          git add system_bridge.json
          
          if git diff --cached --quiet; then
            echo "[-] KHÔNG CÓ THAY ĐỔI CẦN ĐỒNG BỘ."
          else
            git commit -m "[SYSTEM UPDATE] MA TRẬN ĐÃ TỰ ĐỘNG CẬP NHẬT - DONABICO GLOBAL MEDIA"
            git push origin main
            echo "[SUCCESS] ĐỒNG BỘ THÀNH CÔNG."
          fi
