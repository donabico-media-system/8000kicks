name: "ACTIVE-MODULES-SOTA"

concurrency:
  group: "pages"
  cancel-in-progress: true

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  real-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Latest
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic beautifulsoup4
          npm install dotenv || echo "skipped"

      - name: Run Real Modules
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'https://donabico-global-media.github.io/8000kicks/' }}
        run: |
          echo "=== V3000 REAL PRODUCTION MODE ==="
          mkdir -p Modules .github/scripts

          for script in .github/scripts/*.js; do
            if [ -f "$script" ]; then
              node "$script" || echo "Skipped JS"
            fi
          done

          for script in Modules/*.py .github/scripts/*.py; do
            if [ -f "$script" ]; then
              if [[ "$script" == *"Performance-Max"* ]]; then
                continue
              fi
              python "$script" --url "$TARGET_URL" || echo "Skipped Python"
            fi
          done

      - name: Execute Python Post-Processor Shield
        run: |
          printf 'import os\nimport re\nfrom bs4 import BeautifulSoup\nfile_path = "index.html"\nif os.path.exists(file_path):\n    with open(file_path, "r", encoding="utf-8") as f: raw_content = f.read()\n    if "name:" in raw_content or "on:" in raw_content: raw_content = re.sub(r"^[\\s\\S]*?(?=(<!DOCTYPE html>|<html))", "", raw_content)\n    soup = BeautifulSoup(raw_content, "html.parser")\n    links = soup.find_all("a")\n    for link in links:\n        href = link.get("href", "")\n        if "8000kicks" in href or "sjv.io" in href:\n            link.string = "EXPLORE 8000KICKS WATERPROOF HEMP SHOES NOW"\n            link["style"] = "color: #00ff66; font-weight: bold; text-decoration: none; font-family: '\''Times New Roman'\'', Times, serif;"\n            link["data-dnbc-lock"] = "true"\n    with open(file_path, "w", encoding="utf-8") as f: f.write(str(soup))\nprint("Shield executed.")\n' > shield_processor.py
          python shield_processor.py
          rm shield_processor.py

      - name: Inject Clean Script & Style Append
        run: |
          echo '<!-- ULTRA CLEAN INFRASTRUCTURE -->' >> index.html
          echo '<script>
            // 1. Khóa cứng và dọn dẹp các thẻ dịch rác
            function lockAndCleanAffiliateButtons() {
              const targetLinks = document.querySelectorAll("a");
              targetLinks.forEach(link => {
                const href = link.getAttribute("href") || "";
                if (href.includes("8000kicks") || href.includes("sjv.io")) {
                  // Đánh dấu bẫy phần tử để các script khác không can thiệp thô bạo
                  link.setAttribute("data-dnbc-lock", "true");
                  
                  // Chỉ thay đổi text nếu chưa được tối ưu bởi AI Agent động
                  if (!link.innerText.includes("EXPLORE 8000KICKS") && !link.querySelector(".dynamic-alert")) {
                    link.innerHTML = `<span class="base-text" style="font-family: '\''Times New Roman'\'', Times, serif !important;">EXPLORE 8000KICKS WATERPROOF HEMP SHOES NOW</span>`;
                  }
                }
              });
            }

            // 2. Bộ lọc tiếng Việt thông minh - Bỏ qua hoàn toàn các vùng Core Content và nút bấm
            function ultraCleanVietnamese() {
              const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
              let node;
              while (node = walker.nextNode()) {
                if (node.parentElement) {
                  // Nếu nằm trong nút bấm đã khóa hoặc vùng style/script thì bỏ qua tuyệt đối
                  if (node.parentElement.closest("[data-dnbc-lock='\''true'\'']") || 
                      node.parentElement.tagName === "SCRIPT" || 
                      node.parentElement.tagName === "STYLE") {
                    continue;
                  }
                }
                
                if (/[àáạảãâầấậẩẫăằắặẳẵèéẹẻẽêềếệểễìíịỉĩòóọỏõôồốộổỗơờớợởỡùúụủũưừứựửữỳýỵỷỹđ]/i.test(node.nodeValue)) {
                  node.nodeValue = node.nodeValue
                    .replace(/KHÁM PHÁ ECO - ADS AUTOMATIC \+ NODE\.JS/gi, "EXPLORE ECO")
                    .replace(/Giày Gai Dầu Bền Vững Carbon Negative/gi, "Waterproof Hemp Shoes - Carbon Negative");
                }
              }
            }

            function runEcosystemCore() {
              lockAndCleanAffiliateButtons();
              ultraCleanVietnamese();
            }

            if (document.readyState === "loading") {
              document.addEventListener("DOMContentLoaded", runEcosystemCore);
            } else {
              runEcosystemCore();
            }
          </script>' >> index.html

          echo '<style>
            html, body { overflow-x: hidden !important; max-width: 100vw !important; font-family: "Times New Roman", Times, serif !important; }
            body { border: 4px solid #00ff66 !important; box-sizing: border-box; padding: 0 8px; }
            
            /* CSS cố định cho nút không bao giờ bị nhảy kích thước khi text thay đổi */
            a[data-dnbc-lock="true"] {
              display: inline-block !important;
              color: #00ff66 !important; 
              font-weight: bold !important; 
              text-decoration: none !important; 
              font-family: "Times New Roman", Times, serif !important;
              transition: all 0.2s ease-in-out;
            }
            table, .comparison-table { width: 100% !important; max-width: 100% !important; overflow-x: auto; display: block; }
            img { max-width: 100% !important; height: auto !important; }
          </style>' >> index.html

      - name: Commit & Push Verified Clean Build
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "V3000 REAL + STABLE DISPLAY FIX [skip ci]"
            git push origin main
          fi
