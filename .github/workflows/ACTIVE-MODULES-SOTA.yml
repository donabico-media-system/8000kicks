name: "ACTIVE-MODULES-SOTA"

# KHÓA CỨNG HẠ TẦNG: Chặn vĩnh viễn chạy ngầm (Cron)
# Hệ thống chỉ kích hoạt DUY NHẤT khi bạn bấm nút tay thủ công (Manual Trigger)
on:
  workflow_dispatch:

# Quyền hạn ở mức thấp nhất: Chỉ đọc/ghi file thuần túy nội bộ kho
permissions:
  contents: write

jobs:
  real-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Pull Latest Changes
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Pure Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic beautifulsoup4

      - name: Execute Autonomous Modules 24/7
        run: |
          echo "========================================================="
          echo "   🔰 KÍCH HOẠT HỆ THỐNG MÔ-ĐUN TỰ TRỊ TOÀN TRI V3000   "
          echo "========================================================="
          
          if [ -d "Modules" ]; then
            # Dò tìm và sắp xếp thứ tự chạy tuần tự của 4 file .py trong thư mục Modules/
            find Modules/ -type f -name "*.py" | sort | while read -r script; do
              echo "⏳ [PROCESSING] Đang khởi chạy: $script..."
              
              # Thực thi mô-đun độc lập và kiểm tra mã trạng thái trả về (Exit Code)
              if python "$script"; then
                echo "✅ [SUCCESS] $script đã hoàn thành nhiệm vụ ổn định!"
              else
                echo "❌ [FAILED] $script gặp sự cố trong quá trình thực thi."
              fi
              echo "---------------------------------------------------------"
            done
          else
            echo "⚠️ [NOT FOUND] Không tìm thấy thư mục Modules/."
          fi

      - name: Standard Git Push (No Ext Token Required)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          if git diff --cached --quiet; then
            echo "========================================================="
            echo "✅ KHÔNG CÓ THAY ĐỔI - Hệ thống giữ nguyên trạng thái sạch."
            echo "========================================================="
          else
            git commit -m "V3000-Ω AUTONOMOUS MO-DUL PRODUCTION INTEGRATION [skip ci]"
            git push origin main
          fi
