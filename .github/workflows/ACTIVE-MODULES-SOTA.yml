name: ACTIVE-MODULES-SOTA

on:
  schedule:
    - cron: '*/5 * * * *'  # Chạy đệ quy liên tục mỗi 5 phút 24/7
  workflow_dispatch:

jobs:
  modules-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code Matrix
        uses: actions/checkout@v3
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Initialize Python Runtime
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Execute SOTA Core & Modules Calibration
        # Chạy liên hoàn hai file Python để xử lý và ghi đè trực tiếp ra gốc
        run: |
          python "Modules/Active-Modules.py"
          python "Super Core Affiliate/Super-Core-Affiliate.py"

      - name: Ghost Push Clean Signals
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "EATHESEN-CORE-BOT"
          git config --global user.email "core@donabicomedia.net"
          
          # Chỉ quản lý và push duy nhất 1 file JSON ở thư mục gốc
          git add system_bridge.json
          
          if ! git diff --cached --quiet; then
            git commit -m "¢24-SOTA-Modules: Sync Matrix $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git main
          else
            echo "[EATHESEN] Hệ thống cân bằng, bỏ qua chu kỳ Commit."
          fi
