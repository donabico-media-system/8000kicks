      - name: SYNC & COMMIT WITH FORCE RESET
        run: |
          git config --global user.name 'donabico-global-media'
          git config --global user.email 'donabico.media.system@gmail.com'
          
          # 1. Fetch dữ liệu mới nhất
          git fetch origin main
          
          # 2. Reset hard về trạng thái remote để loại bỏ mọi thay đổi cục bộ gây lỗi
          git reset --hard origin/main
          
          # 3. Chạy lại script tạo Bridge để đảm bảo dữ liệu mới nhất
          python Modules/Active-Modules.py
          
          # 4. Add và commit
          git add Modules-Bridge.json
          
          if ! git diff --cached --quiet; then
            git commit -m "[SYSTEM UPDATE] MA TRẬN MODULES - FORCE SYNC - DONABICO"
            git push origin main
          else
            echo "[-] KHÔNG CÓ THAY ĐỔI MỚI."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
