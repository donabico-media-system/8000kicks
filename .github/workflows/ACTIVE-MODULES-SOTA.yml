name: "ACTIVE-MODULES-SOTA"

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  real-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Latest
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic
          npm install dotenv || echo "skipped"

      - name: Run All Real Modules + ULTRA ENGLISH LOCK
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'https://donabico-global-media.github.io/8000kicks/' }}
        run: |
          echo "=== V3000 REAL PRODUCTION MODE ==="

          mkdir -p Modules .github/scripts

          # Run all .js files
          for script in .github/scripts/*.js; do
            if [ -f "$script" ]; then
              echo "â†’ REAL JS: $script"
              node "$script" || echo "Skipped"
            fi
          done

          # Run all .py files (skip simulation)
          for script in Modules/*.py .github/scripts/*.py; do
            if [ -f "$script" ]; then
              if [[ "$script" == *"Performance-Max"* ]]; then
                echo "â†’ Skipped Simulation"
                continue
              fi
              echo "â†’ REAL: $script"
              python "$script" --url "$TARGET_URL" || echo "Skipped"
            fi
          done

          # === ULTRA HARD ENGLISH LOCK ===
          echo '<!-- V3000 ULTRA ENGLISH LOCK -->' >> index.html
          echo '<script>
            const ENGLISH_TITLE = "8000Kicks - Waterproof Hemp Shoes | Sustainable & Durable Footwear 2026";

            function forceEnglish() {
              if (document.title !== ENGLISH_TITLE) {
                document.title = ENGLISH_TITLE;
              }

              document.querySelectorAll("h1, h2, h3").forEach(el => {
                if (el.textContent.includes("Giأ y") || el.textContent.includes("Viل»‡t") || /[أ أ،ل؛،ل؛£أ£أ¢ل؛§ل؛¥ل؛­ل؛©ل؛«ؤƒل؛±ل؛¯ل؛·ل؛³ل؛µأ¨أ©ل؛¹ل؛»ل؛½أھل»پل؛؟ل»‡ل»ƒل»…أ¬أ­ل»‹ل»‰ؤ©أ²أ³ل»چل»ڈأµأ´ل»“ل»‘ل»™ل»•ل»—ئ،ل»‌ل»›ل»£ل»ںل»،أ¹أ؛ل»¥ل»§إ©ئ°ل»«ل»©ل»±ل»­ل»¯ل»³أ½ل»µل»·ل»¹ؤ‘]/i.test(el.textContent)) {
                  el.textContent = el.textContent
                    .replace(/Giأ y Gai Dل؛§u Bل»پn Vل»¯ng Carbon Negative/gi, "Waterproof Hemp Shoes - Carbon Negative")
                    .replace(/Giأ y chل»‘ng nئ°ل»›c/gi, "Waterproof Shoes")
                    .replace(/Bل»پn vل»¯ng/gi, "Sustainable");
                }
              });

              const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
              let node;
              while (node = walker.nextNode()) {
                if (/[أ أ،ل؛،ل؛£أ£أ¢ل؛§ل؛¥ل؛­ل؛©ل؛«ؤƒل؛±ل؛¯ل؛·ل؛³ل؛µأ¨أ©ل؛¹ل؛»ل؛½أھل»پل؛؟ل»‡ل»ƒل»…أ¬أ­ل»‹ل»‰ؤ©أ²أ³ل»چل»ڈأµأ´ل»“ل»‘ل»™ل»•ل»—ئ،ل»‌ل»›ل»£ل»ںل»،أ¹أ؛ل»¥ل»§إ©ئ°ل»«ل»©ل»±ل»­ل»¯ل»³أ½ل»µل»·ل»¹ؤ‘]/i.test(node.nodeValue)) {
                  node.nodeValue = node.nodeValue
                    .replace(/Giأ y Gai Dل؛§u Bل»پn Vل»¯ng Carbon Negative/gi, "Waterproof Hemp Shoes - Carbon Negative")
                    .replace(/Giأ y chل»‘ng nئ°ل»›c/gi, "Waterproof Shoes")
                    .replace(/Bل»پn vل»¯ng/gi, "Sustainable");
                }
              }
            }

            forceEnglish();
            setInterval(forceEnglish, 500);

            const observer = new MutationObserver(forceEnglish);
            observer.observe(document.documentElement, { 
              childList: true, 
              subtree: true, 
              characterData: true 
            });

            console.log("%c[V3000] ULTRA English Lock Activated", "color:#00ff66");
          </script>' >> index.html

          # Green Border + Responsive
          echo '<style>
            html, body { overflow-x: hidden !important; max-width: 100vw !important; }
            body {
              border: 4px solid #00ff66 !important;
              box-sizing: border-box;
              animation: pulseGreen 1.5s infinite alternate ease-in-out !important;
              padding: 0 8px;
            }
            @keyframes pulseGreen {
              0% { border-color: #00cc55; }
              100% { border-color: #00ff66; }
            }
            table, .comparison-table {
              width: 100% !important;
              max-width: 100% !important;
              overflow-x: auto;
              display: block;
            }
            img { max-width: 100% !important; height: auto !important; }
          </style>' >> index.html

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .github/scripts/ Modules/ index.html || true
          
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "V3000 ULTRA ENGLISH LOCK + REAL PRODUCTION [skip ci]"
            git push origin main
            echo "Pushed successfully"
          fi