name: "ACTIVE-MODULES-SOTA"

# Chặn hoàn toàn việc tự chạy ngầm - Chỉ chạy khi bấm nút tay thủ công
on:
  workflow_dispatch:

# Quyền hạn tối giản tuyệt đối, bảo mật 100% không dùng Token ngoài
permissions:
  contents: write

jobs:
  real-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Pull Latest Changes
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Pure Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic beautifulsoup4

      - name: Execute Autonomous Modules 24/7
        run: |
          echo "=== KÍCH HOẠT HỆ THỐNG MÔ-ĐUN TỰ TRỊ TOÀN TRI ==="
          
          # Kiểm tra nếu thư mục Modules tồn tại thì mới quét
          if [ -d "Modules" ]; then
            # Quét và chạy TUẦN TỰ toàn bộ file .py có trong thư mục Modules/
            find Modules/ -type f -name "*.py" | sort | while read -r script; do
              echo "[Run] Khởi chạy mô-đun an toàn: $script"
              python "$script" || echo "[-] Mô-đun $script gặp lỗi hoặc bị bỏ qua."
            done
          else
            echo "[-] Không tìm thấy thư mục Modules/."
          fi

      - name: Standard Git Push (No Ext Token Required)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          if git diff --cached --quiet; then
            echo "=== Hệ thống ổn định: Không có thay đổi nào cần cập nhật ==="
          else
            git commit -m "V3000-Ω AUTONOMOUS SYSTEM DEPLOYMENT COMPLETED [skip ci]"
            git push origin main
          fi
