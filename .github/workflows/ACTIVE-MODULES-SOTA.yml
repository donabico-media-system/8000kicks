name: "ACTIVE-MODULES-SOTA"

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  real-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Latest
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic beautifulsoup4
          npm install dotenv || echo "skipped"

      - name: Run Real Modules + SHIELD AND CLEAN BODY
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'https://donabico-global-media.github.io/8000kicks/' }}
        run: |
          echo "=== V3000 REAL PRODUCTION MODE ==="
          mkdir -p Modules .github/scripts

          # Run all .js files
          for script in .github/scripts/*.js; do
            if [ -f "$script" ]; then
              node "$script" || echo "Skipped"
            fi
          done

          # Run all .py files
          for script in Modules/*.py .github/scripts/*.py; do
            if [ -f "$script" ]; then
              if [[ "$script" == *"Performance-Max"* ]]; then
                continue
              fi
              python "$script" --url "$TARGET_URL" || echo "Skipped"
            fi
          done

          # KHẮC PHỤC TẬP TIN PY LÀM LOẠN: Quét dọn mã yml rác bị chèn ở đầu trang & Ép nút về English chuẩn
          python -c '
import os
import re
from bs4 import BeautifulSoup

file_path = "index.html"
if os.path.exists(file_path):
    with open(file_path, "r", encoding="utf-8") as f:
        raw_content = f.read()
    
    # Loại bỏ tận gốc chuỗi văn bản cấu hình yml bị chèn nhầm ở đỉnh file trước thẻ <!DOCTYPE html>
    if "name:" in raw_content or "on:" in raw_content:
        raw_content = re.sub(r"^[\s\S]*?(?=(<!DOCTYPE html>|<html))", "", raw_content)

    soup = BeautifulSoup(raw_content, "html.parser")
    
    # Khóa và ép toàn bộ nút Affiliate hướng tới 8000kicks về nội dung thương mại sạch
    links = soup.find_all("a")
    for link in links:
        href = link.get("href", "")
        if "8000kicks" in href or "sjv.io" in href:
            link.string = "EXPLORE 8000KICKS WATERPROOF HEMP SHOES NOW"
            link["style"] = "color: #00ff66; font-weight: bold; text-decoration: none; font-family: \"Times New Roman\", Times, serif;"
            link["data-dnbc-lock"] = "true"

    with open(file_path, "w", encoding="utf-8") as f:
        f.write(str(soup))
    print("=== CRITICAL SHIELD: YML Trash Removed & Affiliate Buttons Restored ===")
'

          # ULTRA CLEAN VIETNAMESE TEXT (Chỉ quét text thường, bỏ qua thẻ <a>)
          echo '' >> index.html
          echo '<script>
            function ultraCleanVietnamese() {
              const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
              let node;
              while (node = walker.nextNode()) {
                if (node.parentElement && (node.parentElement.closest("a") || node.parentElement.tagName === "A")) {
                  continue; 
                }
                if (/[àáạảãâầấậẩẫăằắặẳẵèéẹẻẽêềếệểễìíịỉĩòóọỏõôồốộổỗơờớợởỡùúụủũưừứựửữỳýỵỷỹđ]/i.test(node.nodeValue)) {
                  node.nodeValue = node.nodeValue
                    .replace(/KHÁM PHÁ ECO - ADS AUTOMATIC \+ NODE\.JS/gi, "EXPLORE ECO")
                    .replace(/Giày Gai Dầu Bền Vững Carbon Negative/gi, "Waterproof Hemp Shoes - Carbon Negative");
                }
              }
            }
            if (document.readyState === "loading") {
              document.addEventListener("DOMContentLoaded", ultraCleanVietnamese);
            } else {
              ultraCleanVietnamese();
            }
          </script>' >> index.html

          # Green Border Style Enforced
          echo '<style>
            html, body { overflow-x: hidden !important; max-width: 100vw !important; font-family: "Times New Roman", Times, serif !important; }
            body { border: 4px solid #00ff66 !important; box-sizing: border-box; padding: 0 8px; }
            table, .comparison-table { width: 100% !important; max-width: 100% !important; overflow-x: auto; display: block; }
            img { max-width: 100% !important; height: auto !important; }
          </style>' >> index.html

      - name: Commit & Push Verified Build
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "V3000 REAL + AUTOMATIC YML PURGE [skip ci]"
            git push origin main
          fi
